<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalur Langit Pro - Web App</title>
    
    <link rel="icon" type="image/png" href="image/Konter Jalur Langit.png">
    <link rel="apple-touch-icon" href="image/Konter Jalur Langit.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        #sidebar {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 280px;
            z-index: 100;
        }

        @media (min-width: 769px) {
            .main-content { margin-left: 280px; transition: margin-left 0.3s ease; }
            .sidebar-hidden .main-content { margin-left: 0; }
            .sidebar-hidden #sidebar { transform: translateX(-280px); }
        }

        @media (max-width: 768px) {
            #sidebar { transform: translateX(-280px); position: fixed; height: 100vh; }
            #sidebar.mobile-open { transform: translateX(0); }
            .main-content { margin-left: 0 !important; }
            #overlay.active { display: block; }
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 90;
        }

        .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="overlay" onclick="toggleSidebar()" class="transition-opacity"></div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full bg-[#0f172a] text-white shadow-2xl">
        <div class="p-6 w-[280px]">
            <div class="flex flex-col items-center mb-10 mt-4">
                <img src="image/Konter Jalur Langit.png" alt="Logo" class="w-20 h-20 rounded-2xl shadow-lg border-2 border-indigo-500 mb-4 object-cover">
                <h2 class="text-xl font-black text-white leading-none text-center">JALUR LANGIT</h2>
                <p class="text-[10px] text-indigo-400 font-bold mt-2 tracking-widest uppercase text-center px-4 py-1 bg-indigo-500/10 rounded-full">Pro Dashboard</p>
                <button onclick="toggleSidebar()" class="md:hidden absolute top-4 right-4 p-2 text-slate-400">✕</button>
            </div>
            
            <nav class="space-y-2">
                <div class="flex items-center gap-3 p-4 bg-indigo-600/20 border-l-4 border-indigo-500 rounded-r-xl text-indigo-400 cursor-default">
                    <span class="text-xl">🏠</span> <span class="text-sm font-bold uppercase tracking-wider">Dashboard</span>
                </div>
                <div onclick="exportToExcel()" class="flex items-center gap-3 p-4 hover:bg-slate-800 rounded-xl cursor-pointer transition-all text-slate-400 hover:text-white">
                    <span class="text-xl">📊</span> <span class="text-sm font-bold uppercase tracking-wider">Export Excel</span>
                </div>
                <div onclick="clearData()" class="flex items-center gap-3 p-4 hover:bg-red-900/20 rounded-xl cursor-pointer transition-all text-slate-400 hover:text-red-400 mt-20">
                    <span class="text-xl">⚠️</span> <span class="text-sm font-bold uppercase tracking-wider text-red-500">Reset Data</span>
                </div>
            </nav>
        </div>
    </aside>

    <main class="main-content min-h-screen" id="main-content">
        
        <nav class="sticky top-0 z-40 glass border-b border-slate-200 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2.5 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-indigo-50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
                    </svg>
                </button>
                <span class="font-bold text-slate-800 hidden sm:block">Sistem Kasir Jalur Langit</span>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="text-right mr-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase leading-none">Status</p>
                    <p class="text-sm font-bold text-green-600 leading-tight tracking-wide">ONLINE</p>
                </div>
                <img src="image/Konter Jalur Langit.png" class="w-10 h-10 rounded-xl object-cover shadow-md border border-slate-200">
            </div>
        </nav>

        <div class="p-6 md:p-8 space-y-8">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Estimasi Laba</p>
                    <h3 class="text-3xl font-black text-slate-900" id="stat-untung">Rp 0</h3>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border-l-8 border-red-500">
                    <p class="text-xs font-bold text-red-400 uppercase tracking-widest mb-2">Piutang Aktif</p>
                    <h3 class="text-3xl font-black text-red-600" id="stat-hutang">Rp 0</h3>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Transaksi</p>
                    <h3 class="text-3xl font-black text-slate-900" id="stat-count">0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                <div class="xl:col-span-4">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                        <h4 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-3">✚ Transaksi Baru</h4>
                        <div class="space-y-5">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Pelanggan</label>
                                <input type="text" id="nama" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" placeholder="Nama Pelanggan">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Produk</label>
                                <select id="produk" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none cursor-pointer">
                                    <option value="Pulsa">📱 Pulsa</option>
                                    <option value="Paket Data">🌐 Paket Data</option>
                                    <option value="Token Listrik">⚡ Token Listrik</option>
                                    <option value="Alat IoT">🧪 Alat Teknologi</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Modal</label>
                                    <input type="number" id="hargaBeli" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" placeholder="0">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Jual</label>
                                    <input type="number" id="hargaJual" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-indigo-600" placeholder="0">
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Bayar (Cash)</label>
                                <input type="number" id="bayar" class="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-2xl outline-none font-black text-indigo-700" placeholder="Rp 0">
                            </div>
                            <button onclick="simpanData()" class="w-full py-5 btn-gradient text-white rounded-[1.5rem] font-bold shadow-xl shadow-indigo-200 hover:scale-[1.02] active:scale-95 transition-all">SIMPAN</button>
                        </div>
                    </div>
                </div>

                <div class="xl:col-span-8">
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-8 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                            <h4 class="font-bold text-slate-800 text-lg uppercase tracking-tight">Riwayat Penjualan</h4>
                            <div class="relative w-full md:w-64">
                                <input type="text" id="cari" onkeyup="renderTable()" placeholder="Cari pelanggan..." class="w-full pl-10 pr-4 py-3 bg-slate-100 rounded-2xl text-sm outline-none">
                                <span class="absolute left-4 top-3.5 text-slate-400">🔍</span>
                            </div>
                        </div>
                        <div class="overflow-x-auto px-4 pb-4">
                            <table class="w-full text-left border-separate border-spacing-y-2">
                                <thead class="text-[10px] font-bold uppercase text-slate-400">
                                    <tr>
                                        <th class="px-6 py-2">Info</th>
                                        <th class="px-6 py-2 text-right">Tagihan</th>
                                        <th class="px-6 py-2 text-right">Sisa</th>
                                        <th class="px-6 py-2 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="list-transaksi"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let database = JSON.parse(localStorage.getItem('jalurLangitV5_Final')) || [];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const body = document.body;

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-open');
                overlay.classList.toggle('active');
            } else {
                body.classList.toggle('sidebar-hidden');
            }
        }

        function simpanData() {
            const nama = document.getElementById('nama').value;
            const produk = document.getElementById('produk').value;
            const beli = parseInt(document.getElementById('hargaBeli').value) || 0;
            const jual = parseInt(document.getElementById('hargaJual').value) || 0;
            const bayar = parseInt(document.getElementById('bayar').value) || 0;

            if (!nama || jual <= 0) return alert("Cek kembali input!");

            database.unshift({
                id: Date.now(),
                tanggal: new Date().toLocaleDateString('id-ID'),
                nama, produk, beli, jual,
                riwayatBayar: [bayar]
            });

            updateStorage(); renderTable(); resetForm();
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function renderTable() {
            const container = document.getElementById('list-transaksi');
            const search = document.getElementById('cari').value.toLowerCase();
            container.innerHTML = "";
            let u=0, h=0;

            database.forEach(i => {
                const dibayar = i.riwayatBayar.reduce((a,b)=>a+b,0);
                const sisa = i.jual - dibayar;
                
                if(i.nama.toLowerCase().includes(search)) {
                    u += (i.jual - i.beli); h += sisa;
                    const isLunas = sisa <= 0;

                    container.innerHTML += `
                        <tr class="bg-slate-50 hover:bg-indigo-50 transition-all">
                            <td class="px-6 py-5 rounded-l-2xl">
                                <p class="font-bold text-slate-800 leading-none">${i.nama}</p>
                                <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-tighter">${i.produk} • ${i.tanggal}</p>
                            </td>
                            <td class="px-6 py-5 text-right font-semibold">Rp ${i.jual.toLocaleString()}</td>
                            <td class="px-6 py-5 text-right font-black ${sisa > 0 ? 'text-red-500' : 'text-green-500'}">
                                ${isLunas ? 'LUNAS' : 'Rp ' + sisa.toLocaleString()}
                            </td>
                            <td class="px-6 py-5 rounded-r-2xl text-center">
                                <div class="flex justify-center gap-2">
                                    ${!isLunas ? `<button onclick="tambahCicilan(${i.id})" class="p-2 bg-white text-indigo-600 rounded-xl shadow-sm border border-slate-100">💰</button>` : '✅'}
                                    <button onclick="hapusData(${i.id})" class="p-2 text-slate-300 hover:text-red-500">🗑️</button>
                                </div>
                            </td>
                        </tr>`;
                }
            });
            document.getElementById('stat-untung').innerText = "Rp " + u.toLocaleString();
            document.getElementById('stat-hutang').innerText = "Rp " + h.toLocaleString();
            document.getElementById('stat-count').innerText = database.length;
        }

        function tambahCicilan(id) {
            const idx = database.findIndex(i => i.id === id);
            const sisa = database[idx].jual - database[idx].riwayatBayar.reduce((a,b)=>a+b,0);
            const nominal = parseInt(prompt(`Sisa Hutang: Rp ${sisa.toLocaleString()}\nMasukkan Bayar Baru:`));
            if(isNaN(nominal) || nominal <= 0) return;
            database[idx].riwayatBayar.push(nominal > sisa ? sisa : nominal);
            updateStorage(); renderTable();
        }

        function exportToExcel() {
            let csv = "Tanggal,Pelanggan,Produk,Jual,Total Bayar,Sisa Hutang\n";
            database.forEach(i => {
                const b = i.riwayatBayar.reduce((a,x)=>a+x,0);
                csv += `${i.tanggal},${i.nama},${i.produk},${i.jual},${b},${i.jual-b}\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Laporan-Jalur-Langit.csv'; a.click();
        }

        function updateStorage() { localStorage.setItem('jalurLangitV5_Final', JSON.stringify(database)); }
        function resetForm() { document.querySelectorAll('input').forEach(i => i.value = ""); }
        function hapusData(id) { if(confirm("Hapus data ini?")) { database = database.filter(i => i.id !== id); updateStorage(); renderTable(); } }
        function clearData() { if(confirm("RESET SEMUA DATA?")) { database = []; updateStorage(); renderTable(); } }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Ready"));
        }

        renderTable();
    </script>
</body>
</html>
